name: build

on:
  workflow_dispatch:
  schedule:
    - cron: "20 3 * * *"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build.yml"
      - "config/**"
      - "custom/**"
      - "scripts/**"
      - "tools/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"

permissions:
  contents: write

jobs:
  build-geoip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build geoip.dat
        run: make geoip
      - name: Validate geoip.dat
        run: make validate-geoip
      - uses: actions/upload-artifact@v4
        with:
          name: geoip
          path: |
            dist/geoip.dat
            dist/geoip.dat.sha256

  build-geosite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build geosite.dat
        run: make geosite
      - name: Validate geosite.dat
        run: make validate-geosite
      - uses: actions/upload-artifact@v4
        with:
          name: geosite
          path: |
            dist/geosite.dat
            dist/geosite.dat.sha256

  release:
    runs-on: ubuntu-latest
    needs:
      - build-geoip
      - build-geosite
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: geoip
          path: release
      - uses: actions/download-artifact@v4
        with:
          name: geosite
          path: release
      - name: Prepare tag
        id: tag
        run: echo "tag=$(date -u +'%Y%m%d%H%M')" >> "$GITHUB_OUTPUT"
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          make_latest: true
          files: |
            release/geoip.dat
            release/geoip.dat.sha256
            release/geosite.dat
            release/geosite.dat.sha256

